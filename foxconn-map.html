<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js" integrity="sha384-Ukv1p/xTma6P4/2bY5KzWBw+ydSpXmhCMtyciIQVDJ1RmOxtCYNMF1uXT9T63H67" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fdfcf8; font-family: "Noto Sans TC", "PingFang TC", system-ui, sans-serif; }
  #map { height: 100%; }
  #tip { position: absolute; pointer-events: none; padding: 5px 8px; border-radius: 6px; background: #1c3f45; color: #fbf9f3; font-size: 12px; font-weight: 700; opacity: 0; transform: translate(-50%,-125%); white-space: nowrap; z-index: 5; }
</style>
</head>
<body>
<div id="tip"></div>
<svg id="map" style="width:100%;height:100%;display:block;"></svg>
<script>
const EXISTING = [
  { name: "台灣（總部）", role: "總部 / 核心製造", lon: 121.5, lat: 25.05 },
  { name: "美國", role: "美洲入口 / AI 伺服器客戶服務", lon: -98.5, lat: 39.8 },
  { name: "墨西哥", role: "美洲入口 / 組裝製造", lon: -102.5, lat: 23.6 },
  { name: "越南", role: "亞洲入口 / 分散產能", lon: 105.8, lat: 21.0 },
  { name: "捷克", role: "歐洲入口 / AI・機器人展示", lon: 15.5, lat: 49.8 },
  { name: "斯洛伐克", role: "歐洲入口 / 製造據點", lon: 18.1, lat: 48.3 }
];
const NEW_SITES = [
  { name: "法國（Tessalia）", role: "先進封裝合資 · 進行中", lon: -0.37, lat: 49.18 },
  { name: "捷克（延伸）", role: "Czech Tech Day · 觀察中", lon: 15.6, lat: 50.2 },
  { name: "美國", role: "AI 伺服器 / 資料中心 · 評估中", lon: -97.7, lat: 30.3 }
];

const svg = d3.select("#map");
const tip = d3.select("#tip");

async function render() {
  const box = svg.node().getBoundingClientRect();
  const width = box.width || 600;
  const height = box.height || 420;
  svg.attr("viewBox", "0 0 " + width + " " + height);

  const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json");
  const land = topojson.feature(world, world.objects.countries);

  const projection = d3.geoNaturalEarth1().fitSize([width - 20, height - 20], land);
  projection.translate([projection.translate()[0] + 10, projection.translate()[1] + 10]);
  const path = d3.geoPath(projection);

  svg.append("g")
    .selectAll("path")
    .data(land.features)
    .join("path")
    .attr("d", path)
    .attr("fill", "#efeadf")
    .attr("stroke", "#d8d2c2")
    .attr("stroke-width", 0.6);

  function plot(points, color, group) {
    const g = svg.append("g");
    g.selectAll("circle")
      .data(points)
      .join("circle")
      .attr("cx", (d) => projection([d.lon, d.lat])[0])
      .attr("cy", (d) => projection([d.lon, d.lat])[1])
      .attr("r", 6.5)
      .attr("fill", color)
      .attr("fill-opacity", 0.9)
      .attr("stroke", "#ffffff")
      .attr("stroke-width", 1.5)
      .style("cursor", "pointer")
      .on("mouseenter", function (event, d) {
        const [x, y] = projection([d.lon, d.lat]);
        tip.style("left", x + "px").style("top", y + "px").style("opacity", 1)
          .html(d.name + "｜" + d.role);
      })
      .on("mouseleave", function () {
        tip.style("opacity", 0);
      });
  }

  plot(EXISTING, "#1f6f5c");
  plot(NEW_SITES, "#b2591f");

  const legend = svg.append("g").attr("transform", "translate(14," + (height - 34) + ")");
  legend.append("circle").attr("r", 5).attr("cx", 6).attr("cy", 0).attr("fill", "#1f6f5c");
  legend.append("text").attr("x", 16).attr("y", 4).attr("font-size", 11).attr("font-weight", 700).attr("fill", "#6f6a5e").text("既有據點");
  legend.append("circle").attr("r", 5).attr("cx", 96).attr("cy", 0).attr("fill", "#b2591f");
  legend.append("text").attr("x", 106).attr("y", 4).attr("font-size", 11).attr("font-weight", 700).attr("fill", "#6f6a5e").text("新據點評估地點");
}

render();
</script>
</body>
</html>
